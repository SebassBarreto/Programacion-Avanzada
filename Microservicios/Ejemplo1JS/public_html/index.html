        <div onmouseover="mSobre(this)" onmouseout="mAfuera(this)"
             style="background-color:red;

        </div>

            function mSobre(obj) {
                obj.innerHTML = "gracias";
            }
            function mAfuera(obj) {
                obj.innerHTML = "Mouse Sobre mi";
            }
        </script>

        <div onmousedown="mOprimido(this)" onmouseup="mLibre(this)"
             style="background-color:red;
             width:120px;
             height:20px;
             padding:40px;">
            Mantenme presionado
        </div> 

        <script>
            function mOprimido(obj) {
                obj.style.backgroundColor = "blue";
                obj.innerHTML = "liberame";
            }

            function mLibre(obj) {
                obj.style.backgroundColor = "red";
                obj.innerHTML = "Gracias";
            }
        </script>
